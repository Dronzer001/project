<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login/Register Demo</title>
<script>
async function registerUser(event){
  event.preventDefault();
  const username = document.getElementById("regUsername").value;
  const email = document.getElementById("regEmail").value;
  const password = document.getElementById("regPassword").value;

  const res = await fetch("/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, email, password })
  });
  const data = await res.json();
  alert(data.message);
}

async function loginUser(event){
  event.preventDefault();
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  const res = await fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  alert(data.message);
}
</script>
</head>
<body>
<h2>Register</h2>
<form onsubmit="registerUser(event)">
  <input id="regUsername" placeholder="Username" required /><br>
  <input id="regEmail" type="email" placeholder="Email" required /><br>
  <input id="regPassword" type="password" placeholder="Password" required /><br>
  <button type="submit">Register</button>
</form>

<hr>

<h2>Login</h2>
<form onsubmit="loginUser(event)">
  <input id="loginEmail" type="email" placeholder="Email" required /><br>
  <input id="loginPassword" type="password" placeholder="Password" required /><br>
  <button type="submit">Login</button>
</form>
</body>
</html>
